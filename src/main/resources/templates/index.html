<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4 text-center">Task Manager</h2>
        <div class="card p-4 shadow-sm">
            <form th:action="@{/add}" method="post">
                <div class="mb-2"><input class="form-control" name="title" placeholder="Task title" required></div>
                <div class="mb-2"><input class="form-control" name="description" placeholder="Description"></div>
                <div class="mb-2">
                    <select class="form-select" name="status">
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Due Date</label>
                    <input type="date" class="form-control" name="dueDate" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Add Task</button>
            </form>
        </div>
        <hr class="my-5">
        <table class="table table-hover mt-4">
            <thead class="table-dark">
            <tr><th>Title</th><th>Description</th><th>Status</th><th>Due Date</th><th>Action</th></tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.title}"></td>
                <td th:text="${task.description}"></td>
                <td><span th:text="${task.status}" class="badge bg-secondary"></span></td>
                <td th:text="${#temporals.format(task.dueDate, 'yyyy-MM-dd')}"></td>
                <td>
                    <div class="d-flex gap-2">
                        <a th:href="@{/edit/{id}(id=${task.id})}" class="btn btn-outline-primary btn-sm">Edit</a>
                        <form th:action="@{/delete/{id}(id=${task.id})}" method="post" onsubmit="return confirm('Are you sure?')">
                            <button class="btn btn-outline-danger btn-sm">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
