<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Task Manager</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container mt-5">

<h2>Task Manager</h2>

<form action="/add" method="post">

    <input class="form-control mb-2" name="title" placeholder="Task title">
    <input class="form-control mb-2" name="description" placeholder="Description">
    <input class="form-control mb-2" name="status" placeholder="Status">
    <input class="form-control mb-2" name="dueDate" placeholder="Due date">

    <button class="btn btn-primary" type="submit">Add Task</button>

</form>

<hr>

<table class="table">

    <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="task : ${tasks}">

        <td th:text="${task.title}"></td>
        <td th:text="${task.description}"></td>
        <td th:text="${task.status}"></td>

        <td>
            <a th:href="@{/delete/{id}(id=${task.id})}"
               class="btn btn-danger">Delete</a>
        </td>

    </tr>

</table>

</body>
</html>
